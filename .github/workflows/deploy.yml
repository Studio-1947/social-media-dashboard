name: Deploy

# Push to main -> build both prod images, push to GHCR, then redeploy the VPS
# over SSH. See DEPLOY.md for the one-time VPS setup and the GitHub secrets
# this workflow expects.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE_OWNER: studio-1947
  IMAGE_NAME: social-media-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          target: prod
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-server:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build & push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          target: prod
          push: true
          # Relative on purpose, matching docker-compose.prod.yml — the outer
          # nginx proxy forwards to `client`, whose own nginx proxies /api to
          # `server`, so the browser only ever talks to one origin.
          build-args: |
            VITE_API_BASE_URL=/api/metricool
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-client:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-client:${{ github.sha }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Keeps the VPS's compose file + nginx config in sync with the repo on
      # every deploy, so editing deploy/ here is enough — no manual VPS copy.
      - name: Sync deploy config to the VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "deploy/docker-compose.deploy.yml,deploy/nginx/app.conf,deploy/init-letsencrypt.sh"
          target: "/opt/social-flow"
          strip_components: 1

      - name: Pull images and redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            cd /opt/social-flow
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans
            docker image prune -af --filter "until=72h"

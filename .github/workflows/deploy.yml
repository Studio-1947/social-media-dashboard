name: Deploy

# Push to main -> SSH into the VPS, fast-forward its existing clone, rebuild
# the two images locally there, redeploy. No registry involved — the VPS
# builds its own images from source, same as `docker compose -f
# docker-compose.prod.yml up --build` does locally. See DEPLOY.md for the
# one-time VPS setup and the GitHub secrets this workflow expects.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      # The VPS already has its own full clone at /var/www/social-media-dashboard
      # (via the `deploy` user's own GitHub SSH access — separate from
      # VPS_SSH_KEY below, which is only for GitHub Actions to log INTO the
      # VPS). This step fast-forwards that clone to origin/main, then builds
      # and restarts in place.
      #
      # NOTE: this VPS also hosts other projects (task-tracker-s47, doptor-*)
      # behind its own host-level nginx on :80/:443. This job only ever touches
      # /var/www/social-media-dashboard and the `social-flow-deploy` Docker
      # Compose project (its own isolated network/volumes) — it never restarts
      # host nginx or any other project's containers.
      - name: Pull latest code, rebuild, redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            cd /var/www/social-media-dashboard
            git fetch origin main
            git reset --hard origin/main
            cd deploy
            docker compose -f docker-compose.deploy.yml up -d --build --remove-orphans
            docker image prune -af --filter "until=72h"

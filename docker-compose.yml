name: social-flow

# Local development stack. Both services hot-reload from your working tree.
#
#   docker compose up --build
#     client  → http://localhost:5173
#     server  → http://localhost:5000  (health: http://localhost:5000/health)
#
# Requires server/.env — copy server/.env.example and fill in the real Metricool
# credentials. Without it the app still boots, but every analytics request 503s
# and the boot log says "[Metricool] NOT CONFIGURED".

services:
  server:
    build:
      context: ./server
      target: dev
    # Credentials come from the env file at run time — never baked into an image.
    # required:false so a fresh clone still boots (loudly misconfigured, not broken).
    env_file:
      - path: ./server/.env
        required: false
    environment:
      NODE_ENV: development
      PORT: 5000
      # The browser hits the client on :5173, so that's the origin the API must allow.
      FRONTEND_URLS: http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      # Individual paths rather than the whole directory, so the image's
      # node_modules aren't shadowed by the host's (which may be built for a
      # different platform, or absent entirely).
      - ./server/src:/app/src:ro
      - ./server/tsconfig.json:/app/tsconfig.json:ro
    healthcheck:
      # Deliberately NOT /health: that returns 503 when Metricool is unconfigured,
      # which would mark a perfectly running container unhealthy on first run and
      # block anything depending on it. /health is for monitoring; this is for "is
      # the process up".
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  client:
    build:
      context: ./client
      target: dev
    environment:
      # This runs in YOUR browser, not in the container — so it must be the
      # published host port, not the `server` service name.
      VITE_API_BASE_URL: http://localhost:5000/api/metricool
      # Bind mounts don't emit inotify events on Windows/macOS; without polling,
      # hot reload just silently stops working.
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      # Everything you'd realistically edit is mounted, so it takes effect without
      # a rebuild. Only package.json (a dependency change) still needs
      # `docker compose up -d --build` — npm ci runs at image build time.
      - ./client/src:/app/src:ro
      - ./client/index.html:/app/index.html:ro
      - ./client/vite.config.ts:/app/vite.config.ts:ro
      - ./client/tailwind.config.js:/app/tailwind.config.js:ro
      - ./client/postcss.config.js:/app/postcss.config.js:ro
      - ./client/tsconfig.json:/app/tsconfig.json:ro
      - ./client/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./client/tsconfig.node.json:/app/tsconfig.node.json:ro
    depends_on:
      server:
        condition: service_healthy

name: social-flow-deploy

# VPS-side stack. Unlike docker-compose.prod.yml (which builds images locally),
# server/client here are pulled prebuilt from GHCR — CI builds and pushes them,
# this file only ever pulls. Run from /var/www/social-media-dashboard/deploy on
# the VPS, with a sibling .env holding every secret (see DEPLOY.md).
#
#   docker compose -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.deploy.yml up -d --remove-orphans
#
# That's exactly what the GitHub Actions deploy job runs over SSH after every
# push to main — see ../.github/workflows/deploy.yml.
#
# THIS VPS ALSO HOSTS OTHER PROJECTS (task-tracker-s47, doptor-*, a gunicorn
# app) behind a HOST-level nginx already bound to :80/:443. This stack must
# never try to claim those ports — that's why there's no `proxy`/`certbot`
# service here, unlike an earlier draft. Isolation from the other projects:
#   - `client` publishes only to 127.0.0.1:8082 (loopback-only, same pattern
#     doptor-web already uses on 3000) — reachable from the host's nginx, not
#     from the public internet directly.
#   - `server`/`db` aren't published to the host at all, same as before.
#   - Compose namespaces this project's network/volumes under `social-flow-deploy`
#     (see the `name:` above) — entirely separate from the other projects'
#     networks, volumes, and containers. Nothing here can reach or be reached
#     by task-tracker-s47 or doptor's containers.
# TLS + the public :80/:443 vhost for s47-social-flow.duckdns.org are handled
# by the EXISTING host nginx + host certbot — see DEPLOY.md for that vhost.
#
# Layout:
#   client  — the existing nginx image from client/Dockerfile (prod target):
#             serves the SPA and reverse-proxies /api + /health to `server`.
#             Published only to 127.0.0.1:8082 — the host nginx proxies to it.
#   server  — Express API, same image server/Dockerfile already builds.
#   db      — Postgres for user accounts, unpublished.
#   duckdns — re-pings DuckDNS every 5 min so s47-social-flow.duckdns.org keeps
#             pointing at this VPS even if Hostinger ever reassigns the IP.
#             Cheap insurance; harmless if the IP never changes.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: socialflow
      POSTGRES_USER: socialflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env on the VPS}
    volumes:
      - socialflow_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialflow -d socialflow"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  server:
    image: ghcr.io/studio-1947/social-media-dashboard-server:latest
    pull_policy: always
    env_file:
      - path: ./.env
        required: true
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://socialflow:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env on the VPS}@db:5432/socialflow
    expose:
      - "5000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  client:
    image: ghcr.io/studio-1947/social-media-dashboard-client:latest
    pull_policy: always
    ports:
      # Loopback-only: the public internet never reaches this directly, only
      # the host's existing nginx (which already fronts the other projects).
      - "127.0.0.1:8082:80"
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

  duckdns:
    image: alpine:3.20
    environment:
      DUCKDNS_DOMAIN: s47-social-flow
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:?Set DUCKDNS_TOKEN in deploy/.env on the VPS}
    entrypoint: >
      /bin/sh -c "apk add --no-cache curl >/dev/null && while :; do curl -fsS \"https://www.duckdns.org/update?domains=$$DUCKDNS_DOMAIN&token=$$DUCKDNS_TOKEN&ip=\" -o /dev/null || true; sleep 5m; done"
    restart: unless-stopped

volumes:
  socialflow_pgdata_prod:

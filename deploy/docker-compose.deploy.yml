name: social-flow-deploy

# VPS-side stack. Unlike docker-compose.prod.yml (which builds images locally),
# server/client here are pulled prebuilt from GHCR — CI builds and pushes them,
# this file only ever pulls. Run from /opt/social-flow/deploy on the VPS, with a
# sibling .env holding every secret (see DEPLOY.md for the full list).
#
#   docker compose -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.deploy.yml up -d --remove-orphans
#
# That's exactly what the GitHub Actions deploy job runs over SSH after every
# push to main — see ../.github/workflows/deploy.yml.
#
# Layout:
#   proxy   — nginx, terminates TLS for s47-social-flow.duckdns.org, forwards
#             everything to `client`. Reloads itself every 6h to pick up
#             certs renewed by `certbot`.
#   certbot — renews the Let's Encrypt cert every 12h via the webroot method.
#             Issuing the FIRST cert is a one-time manual step — see
#             init-letsencrypt.sh — because nginx can't start with ssl_certificate
#             directives pointing at files that don't exist yet.
#   client  — the existing nginx image from client/Dockerfile (prod target):
#             serves the SPA and reverse-proxies /api + /health to `server`.
#             Not published to the host — only `proxy` can reach it.
#   server  — Express API, same image server/Dockerfile already builds.
#   db      — Postgres for user accounts, unpublished.
#   duckdns — re-pings DuckDNS every 5 min so s47-social-flow.duckdns.org keeps
#             pointing at this VPS even if Hostinger ever reassigns the IP.
#             Cheap insurance; harmless if the IP never changes.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: socialflow
      POSTGRES_USER: socialflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env on the VPS}
    volumes:
      - socialflow_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialflow -d socialflow"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  server:
    image: ghcr.io/studio-1947/social-media-dashboard-server:latest
    pull_policy: always
    env_file:
      - path: ./.env
        required: true
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://socialflow:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env on the VPS}@db:5432/socialflow
    expose:
      - "5000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  client:
    image: ghcr.io/studio-1947/social-media-dashboard-client:latest
    pull_policy: always
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    # nginx caches the loaded cert in memory, so a renewal on disk does nothing
    # until reloaded. `nginx -s reload` is graceful — in-flight requests finish
    # on the old worker while new ones pick up the fresh cert.
    entrypoint: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    restart: unless-stopped
    depends_on:
      - client

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

  duckdns:
    image: alpine:3.20
    environment:
      DUCKDNS_DOMAIN: s47-social-flow
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:?Set DUCKDNS_TOKEN in deploy/.env on the VPS}
    entrypoint: >
      /bin/sh -c "apk add --no-cache curl >/dev/null && while :; do curl -fsS \"https://www.duckdns.org/update?domains=$$DUCKDNS_DOMAIN&token=$$DUCKDNS_TOKEN&ip=\" -o /dev/null || true; sleep 5m; done"
    restart: unless-stopped

volumes:
  socialflow_pgdata_prod:
  certbot_conf:
  certbot_www:

# Outer, host-facing nginx. Terminates TLS for the DuckDNS domain and forwards
# everything to the `client` container, whose OWN nginx (client/nginx.conf,
# unchanged) still does the SPA fallback + /api + /health proxying to `server`.
# This file only exists to own the domain and the certificate — it knows
# nothing about the app's routes.
#
# Both server blocks must exist from the first boot, including the one
# referencing certs that don't exist yet — see init-letsencrypt.sh, which
# writes a throwaway dummy cert to the same path so nginx can start at all,
# then replaces it with the real one.

server {
    listen 80;
    server_name s47-social-flow.duckdns.org;

    # Let's Encrypt's HTTP-01 challenge — certbot writes the response file here
    # via the certbot_www volume, and nginx must serve it over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name s47-social-flow.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/s47-social-flow.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s47-social-flow.duckdns.org/privkey.pem;

    # Mozilla "intermediate" profile, ECDHE-only so no dhparam file is needed.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://client:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

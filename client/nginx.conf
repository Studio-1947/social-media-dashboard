server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: every unknown path is a client route, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API so the browser only ever talks to one origin.
    # This is why the prod bundle uses a relative VITE_API_BASE_URL (/api/metricool)
    # and why CORS never comes into play in the prod stack.
    location /api/ {
        proxy_pass http://server:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Exposed so uptime monitoring can hit the Metricool health check through the
    # same origin. Returns 503 when the token/userId/blogId are wrong or expired.
    location /health {
        proxy_pass http://server:5000/health;
        proxy_set_header Host $host;
    }

    # Vite fingerprints its asset filenames, so they're safe to cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}

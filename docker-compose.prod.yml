name: social-flow-prod

# Production-parity stack, runnable locally:
#
#   docker compose -f docker-compose.prod.yml up --build
#     app → http://localhost:8080
#
# Differences from the dev stack that actually matter:
#   - The client is a static build served by nginx, not the Vite dev server.
#   - nginx reverse-proxies /api and /health to the server, so the browser talks
#     to a single origin and CORS never applies.
#   - Neither the server nor the database ports are published: nothing reaches
#     them except through nginx / the server itself.
#   - The server runs compiled JS as a non-root user, with no dev dependencies.
#   - Postgres has NO default password here (unlike the dev stack) — you must
#     set POSTGRES_PASSWORD, or `docker compose up` refuses to start.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: socialflow
      POSTGRES_USER: socialflow
      # No fallback on purpose — a prod-parity stack shouldn't have a guessable
      # default. Set it in your shell or an untracked .env at the repo root.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before running the prod stack}
    volumes:
      - socialflow_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialflow -d socialflow"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  server:
    build:
      context: ./server
      target: prod
    env_file:
      - path: ./server/.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://socialflow:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before running the prod stack}@db:5432/socialflow
    expose:
      - "5000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      target: prod
      args:
        # Relative on purpose — nginx proxies it to the server. Vite inlines this
        # at BUILD time, so changing it later means rebuilding the image, not
        # restarting the container.
        VITE_API_BASE_URL: /api/metricool
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

volumes:
  socialflow_pgdata_prod:
